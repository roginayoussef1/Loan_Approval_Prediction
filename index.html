<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        h2 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Loan Approval Prediction</h2>

    <form action="/predict" method="post">

        <input type="number" name="ApplicantIncome" placeholder="Applicant Income" required>

        <input type="number" name="CoapplicantIncome" placeholder="Coapplicant Income" required>
</html>
