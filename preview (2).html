<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loan Approval Prediction System</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:900px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            display:grid;
            grid-template-columns:1fr 1fr;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .left-side{
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            color:white;
            padding:50px 40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left-side h1{
            font-size:38px;
            margin-bottom:20px;
        }

        .left-side p{
            line-height:1.8;
            font-size:16px;
            opacity:0.9;
        }

        .right-side{
            padding:40px;
        }

        .right-side h2{
            margin-bottom:25px;
            color:#1e293b;
            text-align:center;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#334155;
        }

        .input-group input,
        .input-group select{

            width:100%;
            padding:12px;
            border:1px solid #cbd5e1;
            border-radius:10px;
            font-size:15px;
            transition:0.3s;
        }

        .input-group input:focus,
        .input-group select:focus{

            border-color:#2563eb;
            outline:none;
            box-shadow:0 0 10px rgba(37,99,235,0.2);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .btn:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        .result{
            margin-top:25px;
            padding:15px;
            border-radius:10px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            background:#f1f5f9;
            color:#0f172a;
        }

        .features{
            margin-top:25px;
        }

        .features div{
            margin-bottom:12px;
            display:flex;
            align-items:center;
            gap:10px;
        }

        .features i{
            color:#93c5fd;
        }

        @media(max-width:850px){

            .container{
                grid-template-columns:1fr;
            }

            .left-side{
                text-align:center;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="left-side">

        <h1>Loan Approval AI</h1>

        <p>
            Intelligent machine learning system for predicting
            loan approval based on customer financial information.
        </p>

        <div class="features">

            <div>
                <i class="fa-solid fa-chart-line"></i>
                Machine Learning Prediction
            </div>

            <div>
                <i class="fa-solid fa-shield-halved"></i>
                Secure Processing
            </div>

            <div>
                <i class="fa-solid fa-bolt"></i>
                Instant Results
            </div>

        </div>

    </div>

    <div class="right-side">

        <h2>Prediction Form</h2>

        <form action="/predict" method="post">

            <div class="input-group">
                <label>Applicant Income</label>

                <input type="number"
                name="ApplicantIncome"
                placeholder="Enter applicant income"
                required>
            </div>

            <div class="input-group">
                <label>Coapplicant Income</label>

                <input type="number"
                name="CoapplicantIncome"
                placeholder="Enter coapplicant income"
                required>
            </div>

            <div class="input-group">
                <label>Loan Amount</label>

                <input type="number"
                name="LoanAmount"
                placeholder="Enter loan amount"
                required>
            </div>

            <div class="input-group">
                <label>Loan Amount Term</label>

                <input type="number"
                name="Loan_Amount_Term"
                placeholder="Enter loan term"
                required>
            </div>

            <div class="input-group">
                <label>Credit History</label>

                <select name="Credit_History" required>

                    <option value="">Select</option>

                    <option value="1">
                        Good Credit History
                    </option>

                    <option value="0">
                        Bad Credit History
                    </option>

                </select>
            </div>

            <!-- NEW FEATURES -->

            <div class="input-group">
                <label>Education</label>

                <select name="Education">

                    <option value="Graduate">
                        Graduate
                    </option>

                    <option value="Not Graduate">
                        Not Graduate
                    </option>

                </select>
            </div>

            <div class="input-group">
                <label>Marital Status</label>

                <select name="Married">

                    <option value="Yes">
                        Married
                    </option>

                    <option value="No">
                        Single
                    </option>

                </select>
            </div>

            <div class="input-group">
                <label>Property Area</label>

                <select name="Property_Area">

                    <option value="Urban">
                        Urban
                    </option>

                    <option value="Semiurban">
                        Semiurban
                    </option>

                    <option value="Rural">
                        Rural
                    </option>

                </select>
            </div>

            <button class="btn" type="submit">

                <i class="fa-solid fa-magnifying-glass-chart"></i>

                Predict Loan Status

            </button>

        </form>

        <div class="result">

            {{ prediction_text }}

        </div>

    </div>

</div>

</body>
</html>
